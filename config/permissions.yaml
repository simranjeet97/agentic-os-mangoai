# =============================================================================
# Agentic AI OS — RBAC Permissions Configuration
# =============================================================================
# Capabilities are checked by PermissionEngine and PermissionChecker before
# any agent action. Roles are hierarchical: admin > operator > user > readonly > guest

roles:

  admin:
    description: "Full system access — trusted administrators only"
    capabilities:
      - file_read
      - file_write
      - file_delete
      - shell_exec
      - docker_run
      - web_browse
      - web_search
      - code_generate
      - code_execute
      - code_lint
      - code_test
      - memory_read
      - memory_write
      - memory_delete
      - process_list
      - process_kill
      - config_read
      - config_write
      - audit_read
      - task_decompose
    rate_limits:
      requests_per_minute: 300
      max_concurrent_tasks: 10

  operator:
    description: "Elevated access for power users and automation"
    capabilities:
      - file_read
      - file_write
      - shell_exec
      - web_browse
      - web_search
      - code_generate
      - code_execute
      - code_lint
      - memory_read
      - memory_write
      - process_list
      - task_decompose
    rate_limits:
      requests_per_minute: 120
      max_concurrent_tasks: 5

  user:
    description: "Standard user — full capabilities with safety guardrails"
    capabilities:
      - file_read
      - file_write
      - file_delete
      - shell_exec
      - docker_run
      - code_execute
      - code_generate
      - code_lint
      - code_test
      - web_browse
      - web_search
      - memory_read
      - memory_write
      - task_decompose
      - process_list
      - process_spawn
      - process_kill
      - config_read
      - config_write
      - planner
      - executor
      - file
      - web
      - code
      - system
    rate_limits:
      requests_per_minute: 100
      max_concurrent_tasks: 5

  readonly:
    description: "Read-only access for monitoring and inspection"
    capabilities:
      - file_read
      - memory_read
      - web_search
    rate_limits:
      requests_per_minute: 30
      max_concurrent_tasks: 1

  guest:
    description: "Minimal access — unauthenticated or trial users"
    capabilities:
      - web_search
    rate_limits:
      requests_per_minute: 10
      max_concurrent_tasks: 1

  default:
    description: "Default role — full OS capabilities for the primary user"
    capabilities:
      - file_read
      - file_write
      - file_delete
      - shell_exec
      - docker_run
      - code_execute
      - code_generate
      - code_lint
      - code_test
      - web_browse
      - web_search
      - memory_read
      - memory_write
      - task_decompose
      - process_list
      - process_spawn
      - process_kill
      - config_read
      - config_write
      - planner
      - executor
      - file
      - web
      - code
      - system
    rate_limits:
      requests_per_minute: 100
      max_concurrent_tasks: 10

# =============================================================================
# Agent type RBAC (used by PermissionChecker)
# Maps agent_type strings to allowed capabilities
# =============================================================================
agent_roles:
  planner:            # Alias for planner_agent
    - memory_read
    - memory_write
    - task_decompose
    - web_search
  executor:           # Alias for executor_agent
    - shell_exec
    - docker_run
    - file_write
    - code_execute
    - memory_read
    - memory_write
  file:               # Alias for file_agent
    - file_read
    - file_write
    - file_delete
    - memory_read
  web:                # Alias for web_agent
    - web_browse
    - web_search
    - memory_read
    - memory_write
  system:             # Alias for system_agent
    - shell_exec
    - process_list
    - process_kill
    - config_read
  code:               # Alias for code_agent
    - code_generate
    - code_execute
    - code_lint
    - code_test
    - file_read
    - file_write
  planner_agent:
    - memory_read
    - memory_write
    - task_decompose
    - web_search
  executor_agent:
    - shell_exec
    - docker_run
    - file_write
    - code_execute
    - memory_read
    - memory_write
  file_agent:
    - file_read
    - file_write
    - file_delete
    - memory_read
  web_agent:
    - web_browse
    - web_search
    - memory_read
    - memory_write
  system_agent:
    - shell_exec
    - process_list
    - process_kill
    - config_read
  code_agent:
    - code_generate
    - code_execute
    - code_lint
    - code_test
    - file_read
    - file_write
  default:
    - file_read
    - file_write
    - file_delete
    - shell_exec
    - web_browse
    - web_search
    - code_generate
    - code_execute
    - memory_read
    - memory_write
    - task_decompose

# =============================================================================
# File Zones (used by PermissionChecker)
# READONLY:     No writes allowed, ever
# AGENT_WRITE:  Agent can write without user confirmation
# USER_CONFIRM: Writes require explicit human approval
# =============================================================================
file_zones:
  READONLY:
    - /etc
    - /usr
    - /bin
    - /sbin
    - /lib
    - /lib64
    - /proc
    - /sys
    - /boot
    - /dev
  AGENT_WRITE:
    - /tmp/agent_workspace
    - /home/agent/workspace
    - /var/agent/scratch
    - /tmp
  USER_CONFIRM:
    - /home
    - /root
    - /var
    - /opt

# =============================================================================
# Capability definitions (documentation)
# =============================================================================
capability_definitions:
  file_read:      "Read files from the sandbox"
  file_write:     "Write files to the sandbox"
  file_delete:    "Delete files from the sandbox"
  shell_exec:     "Execute shell commands in sandbox"
  docker_run:     "Run Docker containers"
  web_browse:     "Use Playwright browser"
  web_search:     "Search the web via DuckDuckGo/SerpAPI"
  code_generate:  "Generate code with LLM"
  code_execute:   "Execute code in sandbox"
  code_lint:      "Run linters on code"
  code_test:      "Run test suites"
  memory_read:    "Read from Redis/ChromaDB"
  memory_write:   "Write to Redis/ChromaDB"
  memory_delete:  "Delete memory records"
  process_list:   "List system processes"
  process_kill:   "Terminate a process"
  config_read:    "Read system configuration"
  config_write:   "Modify system configuration"
  audit_read:     "Read audit logs"
  task_decompose: "Decompose tasks into subtasks (planner)"
